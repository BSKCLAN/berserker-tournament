<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BERSERKER Tournament Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a3a52; color: white; font-family: Arial, sans-serif; padding: 20px; }
    h1 { color: #00D9FF; font-size: 32px; margin-bottom: 10px; }
    p { color: #888; margin-bottom: 20px; }
    button { padding: 10px 20px; margin-right: 10px; background: #00D9FF; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .stats { background: #0f1e2e; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
    .stats h2 { color: #00D9FF; margin-bottom: 10px; }
    .players { background: #0f1e2e; padding: 20px; border-radius: 5px; }
    .players h2 { color: #00D9FF; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
    .player-btn { padding: 15px; background: #1a3a52; color: white; border: 2px solid #00D9FF; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
    .player-btn:hover { background: #00D9FF; color: black; }
    .active { background: #00D9FF; color: black; }
    .footer { margin-top: 40px; text-align: center; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h1>⚡ BERSERKER CLAN</h1>
  <p>TORNEO EN VIVO</p>

  <div style="margin-bottom: 20px;">
    <button onclick="alert('GRABANDO')">GRABAR</button>
    <button onclick="alert('EN VIVO')">EN VIVO</button>
  </div>

  <div class="stats">
    <h2>📊 ESTADÍSTICAS</h2>
    <p>⏰ Tiempo: 24:35</p>
    <p>⚔️ Kills: 47</p>
    <p>🔴 En Batalla: 7/8</p>
  </div>

  <div class="players">
    <h2>⚡ JUGADORES EN BATALLA</h2>
    <div class="grid">
      <button class="player-btn" onclick="select(this, 'IceStorm')">⚔️ IceStorm 12⚡</button>
      <button class="player-btn" onclick="select(this, 'ThunderAxe')">⚔️ ThunderAxe 8⚡</button>
      <button class="player-btn" onclick="select(this, 'FrostByte')">⚔️ FrostByte 15⚡</button>
      <button class="player-btn" onclick="select(this, 'StormShield')">⚔️ StormShield 5⚡</button>
      <button class="player-btn" onclick="select(this, 'VoidSlayer')">⚔️ VoidSlayer 10⚡</button>
      <button class="player-btn" onclick="select(this, 'IceBreaker')">⚔️ IceBreaker 9⚡</button>
      <button class="player-btn" onclick="select(this, 'LightningKing')">⚔️ LightningKing 4⚡</button>
      <button class="player-btn" onclick="select(this, 'FrostGuard')">⚔️ FrostGuard 7⚡</button>
    </div>
  </div>

  <div id="stream" style="margin-top: 20px; padding: 20px; background: #0f1e2e; border-radius: 5px; border-left: 4px solid #00D9FF; display: none;">
    <h3 style="color: #00D9FF;">🎮 Stream Principal: <span id="playerName"></span></h3>
  </div>

  <div class="footer">
    <p>⚡ BERSERKER TOURNAMENT CONTROL v1.0</p>
    <p>Prepare for Battle</p>
  </div>

  <script>
    function select(btn, name) {
      document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('playerName').textContent = name;
      document.getElementById('stream').style.display = 'block';
    }
  </script>
</body>
</html>
